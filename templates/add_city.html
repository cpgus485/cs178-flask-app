<!doctype html>
<html lang="en">
  <head>
    <title>Add New City</title>
  </head>
  <body>
    <h1>Add New city</h1>
    <form action="{{ url_for('add_city') }}" method="post">
      <label for="city">City:</label><br />
      <input type="text" id="city" name="city" required /><br />

      <label for="visits">Number of visits:</label><br />
      <input type="integer" id="visits" name="visits" required /><br />

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>

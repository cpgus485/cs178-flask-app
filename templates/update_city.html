<!doctype html>
<html lang="en">
  <head>
    <title>Update City</title>
  </head>
  <body>
    <h1>Update city</h1>
    <form action="{{ url_for('update_city') }}" method="post">
      <label for="city">City:</label><br />
      <input type="text" id="city" name="city" required /><br />

      <label for="visits">Visits:</label><br />
      <input type="number" id="visits" name="visits" required /><br />

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
